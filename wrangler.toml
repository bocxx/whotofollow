name = "whotofollow"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

# Custom domains are bound via the Cloudflare dashboard
# (Worker → Settings → Domains & Routes → Add Custom Domain),
# not declared here — avoids "Can't infer zone" errors during deploy.

[assets]
directory = "./dist"
not_found_handling = "404-page"

[observability]
enabled = true
